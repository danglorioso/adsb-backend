<!DOCTYPE html>
  <html>
  <head>
    <meta charset="utf-8">
    <title>My Flight Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
      body { margin: 0; background: #111; color: #fff; font-family: monospace; }
      #map { width: 100vw; height: 100vh; }
      #status { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
                padding: 8px 12px; border-radius: 4px; z-index: 999; font-size: 13px; }
      #copyright { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
                   background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 4px;
                   z-index: 999; font-size: 12px; white-space: nowrap; }
      #copyright a { color: #FFD700; text-decoration: none; }
      #copyright a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="status">Connecting...</div>
    <div id="copyright">ADS-B data by <a href="https://danglorioso.com" target="_blank">Dan Glorioso</a> &copy; 2025</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map('map').setView([42.2, -70.9], 9); // centered on eastern MA

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
      }).addTo(map);

      const planeIcon = L.divIcon({
        className: '',
        html: '<span style="font-size:28px;color:#FFD700;text-shadow:0 0 4px #000;">✈</span>',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });

      const markers = {};
      const status = document.getElementById('status');

      function updateAircraft(aircraft) {
        const seen = new Set();

        aircraft.forEach(ac => {
          const id = ac.hex;
          seen.add(id);
          const label = ac.flight?.trim() || id;
          const popup = `
            <b>${label}</b><br>
            Alt: ${ac.altitude?.toLocaleString() ?? '?'} ft<br>
            Speed: ${ac.speed ?? '?'} kt<br>
            Heading: ${ac.track ?? '?'}°<br>
            Squawk: ${ac.squawk ?? '?'}<br>
            RSSI: ${ac.rssi ?? '?'} dBFS
          `;

          if (markers[id]) {
            markers[id].setLatLng([ac.lat, ac.lon]);
            markers[id].getPopup()?.setContent(popup);
            // Rotate icon by heading if you add CSS rotation
          } else {
            markers[id] = L.marker([ac.lat, ac.lon], { icon: planeIcon })
              .bindPopup(popup)
              .addTo(map);
          }
        });

        // Remove stale markers
        Object.keys(markers).forEach(id => {
          if (!seen.has(id)) {
            map.removeLayer(markers[id]);
            delete markers[id];
          }
        });

        status.textContent = `${aircraft.length} aircraft · ${new Date().toLocaleTimeString()}`;
      }

      function connect() {
        // const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`wss://adsb-backend-production.up.railway.app`);

        ws.onmessage = e => {
          const { aircraft } = JSON.parse(e.data);
          updateAircraft(aircraft);
        };

        ws.onclose = () => {
          status.textContent = 'Disconnected — reconnecting...';
          setTimeout(connect, 3000);
        };

        ws.onerror = () => ws.close();
      }

      connect();

      // Auto-refresh page every 60 seconds to keep data fresh
      setTimeout(() => location.reload(), 60000);
    </script>
  </body>
  </html>
